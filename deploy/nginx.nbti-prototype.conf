server {
    listen 8091;
    listen [::]:8091;
    server_name _;

    root /var/www/nbti-prototype/current;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
